version: '3.8'

services:
  postgres-dev:
    image: postgres:15-alpine
    container_name: stockmarket-db-dev
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: stockmarket_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: